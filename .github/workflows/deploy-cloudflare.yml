name: Deploy Cloudflare Backend

on:
  push:
    branches: [main, master]
    paths:
      - 'cloudflare-worker/**'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  WORKER_NAME: spotkin-backend
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Cloudflare Worker
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Authenticate with Cloudflare
        run: echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler auth login
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        id: deploy
        working-directory: ./cloudflare-worker
        run: |
          # Deploy the worker
          DEPLOY_OUTPUT=$(wrangler deploy --config wrangler.deploy.toml 2>&1)
          echo "$DEPLOY_OUTPUT"
          
          # Extract worker URL from output
          WORKER_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[^[:space:]]+\.workers\.dev' | head -1)
          echo "WORKER_URL=$WORKER_URL" >> $GITHUB_ENV
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Worker Secrets
        working-directory: ./cloudflare-worker
        run: |
          # Set the API token as a secret on the worker
          echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler secret put CLOUDFLARE_API_TOKEN --name ${{ env.WORKER_NAME }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify Deployment
        run: |
          echo "Testing deployment at: ${{ env.WORKER_URL }}"
          
          # Test health endpoint
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.WORKER_URL }}/health")
          
          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "✅ Health check passed"
            curl -s "${{ env.WORKER_URL }}/health" | jq .
          else
            echo "❌ Health check failed with status: $HEALTH_STATUS"
            exit 1
          fi
          
          # Test TURN endpoint (CORS preflight first)
          CORS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X OPTIONS \
            -H "Origin: https://dseeker.github.io" \
            -H "Access-Control-Request-Method: POST" \
            "${{ env.WORKER_URL }}/turn")
          
          if [ "$CORS_STATUS" = "204" ] || [ "$CORS_STATUS" = "200" ]; then
            echo "✅ CORS configuration working"
          else
            echo "⚠️ CORS check returned: $CORS_STATUS"
          fi

      - name: Update GitHub Deployment Status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const workerUrl = process.env.WORKER_URL;
            const commitSha = context.sha.substring(0, 7);
            
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Cloudflare Worker Deployed**\n\n` +
                    `- **URL**: ${workerUrl}\n` +
                    `- **Health**: ${workerUrl}/health\n` +
                    `- **TURN**: ${workerUrl}/turn\n` +
                    `- **AI**: ${workerUrl}/classify\n\n` +
                    `Commit: ${commitSha}`
            });

      - name: Summary
        if: always()
        run: |
          echo "## Cloudflare Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **Deployment Successful**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Worker URL**: ${{ env.WORKER_URL }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Endpoints**:" >> $GITHUB_STEP_SUMMARY
            echo "- Health Check: \`${{ env.WORKER_URL }}/health\`" >> $GITHUB_STEP_SUMMARY
            echo "- TURN Proxy: \`${{ env.WORKER_URL }}/turn\`" >> $GITHUB_STEP_SUMMARY
            echo "- AI Classify: \`${{ env.WORKER_URL }}/classify\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment Failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
